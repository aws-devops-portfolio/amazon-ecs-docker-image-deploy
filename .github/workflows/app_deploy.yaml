name: Application CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: 'us-east-1'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build and run tests
        run: mvn clean verify

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubAction-Role
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        if: github.event_name == 'push'
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} .
          docker tag -t ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} \
            ${{ secrets.ACCOUNT_ID }}.dkr.ecr.$ {{ AWS_REGION }}.amazon.com/  ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazon.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
