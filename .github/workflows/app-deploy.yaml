name: Application CI/CD

on:
  push:
    branches: [ main ]
  #  paths:
  #    - "product-app/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: product-app-ecr
  ECS_CLUSTER: product-app-cluster
  ECS_SERVICE: product-app-service
  TASK_FAMILY: task-definition-product-app
  CONTAINER_NAME: product-app

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: mvn clean package -DskipTests
        working-directory: ./product-app

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/ECSFargateGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        working-directory: ./product-app

      # 👇 THIS IS THE IMPORTANT PART
      - name: Update ECS Task Definition
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $(aws ecs list-task-definitions \
            --family-prefix task-definition-product-app \
            --sort DESC \
            --max-items 1 \
            --query 'taskDefinitionArns[0]' \
            --output text) \
            --region us-east-1)

          NEW_IMAGE="889049355474.dkr.ecr.us-east-1.amazonaws.com/${ECR_REPOSITORY}:3d37975d0d3e318eb7b33de6dbfeabc892caf71e"

          UPDATED=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$NEW_IMAGE" \
            --arg NAME "$CONTAINER_NAME" \
            '.taskDefinition
            | .containerDefinitions
            |= map(if .name == $NAME then .image = $IMAGE else . end)
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )')

          echo "$UPDATED" > new-task-def.json

      - name: Register Updated Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment