name: Infrastructure and Application CI/CD

on:
  push:
    branches: 
      - main 
      - develop
  #  paths:
  #    - "terraform/**"
  #    - "product-app/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:  
  AWS_REGION: us-east-1  
  CONTAINER_NAME: product-app
  TF_STATE_BUCKET: devhub164-state-demo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment name
        run: |
          if [[ $GITHUB_REF == "refs/heads/main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      - name: Set up resource names
        run: |
          echo "ECR_REPOSITORY=$ENV-$CONTAINER_NAME-ecr" >> $GITHUB_ENV
          echo "ECS_CLUSTER=$ENV-$CONTAINER_NAME-cluster" >> $GITHUB_ENV
          echo "ECS_SERVICE=$ENV-$CONTAINER_NAME-service" >> $GITHUB_ENV
          echo "TASK_FAMILY=task-definition-$ENV-$CONTAINER_NAME" >> $GITHUB_ENV    

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/ECSFargateGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      # INFRASTRUCTURE (Terraform)
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Initialization
        working-directory: terraform/environments/${{ env.ENV }}
        run: |
          echo "ENV is: ${{ env.ENV }}"
          terraform init \
            - backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            - backend-config="key=s3-github-actions/ecs/${{ env.ENV }}/terraform.tfstate" \
            - backend-config="region=${{ env.AWS_REGION }}" \
            - backend-config="use_lockfile=true"
   
      - name: Terraform Validation
        working-directory: terraform/environments/${{ env.ENV }}
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform/environments/${{ env.ENV }}
        run: terraform apply -auto-approve -var-file=environments/${{ env.ENV }}.tfvars      

      # Build the application 
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: mvn clean package -DskipTests
        working-directory: ./product-app

      # Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push Docker image to ECR
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }} .
          docker push ${{ env.ECR_REPOSITORY }}

      # Update ECS Task Definition and deploy
      - name: Update ECS Task Definition
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY)

          NEW_IMAGE="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ github.sha }}"

          UPDATED=$(echo $TASK_DEF | jq \
            --arg IMAGE "$NEW_IMAGE" \
            --arg NAME "$CONTAINER_NAME" \
            '.taskDefinition
            | .containerDefinitions
            |= map(if .name == $NAME then .image = $IMAGE else . end)
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )')

          echo "$UPDATED" > new-task-def.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $NEW_TASK_DEF_ARN \
            --force-new-deployment