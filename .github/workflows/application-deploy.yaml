name: Build, Push & Deploy to ECS

on:
  push:
    branches: [ main ]
    paths:
      - "product-app/src/**"
      - "product-app/pom.xml"
      - "product-app/Dockerfile"

  pull_request:
    branches: [ main ]
    paths:
     - "product-app/src/**"
     - "product-app/pom.xml"
     - "product-app/Dockerfile"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: product-app-ecr
  ECS_CLUSTER: product-app-cluster
  ECS_SERVICE: product-app-service
  CONTAINER_NAME: product-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Java
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 3. Build Maven project
      - name: Build Maven project
        run: mvn clean package -DskipTests
        working-directory: ./src   # path to pom.xml

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/ECSFargateGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      # 4. Log in to Amazon ECR
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build Docker image
      - name: Build Docker image
        if: github.event_name == 'push'
        run: |
          docker build -t product-app:latest .
          docker tag product-app:latest ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/my-app:latest
        working-directory: ./src

      # 6. Push Docker image to ECR
      - name: Push Docker image
        if: github.event_name == 'push'
        run: docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/my-app:latest

      # 7. Update ECS service to use new image
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-update-service@v1
        with:
          cluster: $ECS_CLUSTER          
          service: $ECS_SERVICE           
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/my-app:latest
          wait-for-service-stability: true
