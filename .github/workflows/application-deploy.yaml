name: Build, Push & Deploy to ECS

on:
  push:
    branches: [ main ]
  #  paths:
  #    - "product-app/src/**"
  #    - "product-app/pom.xml"
  #    - "product-app/Dockerfile"

  pull_request:
    branches: [ main ]
    paths:
     - "product-app/src/**"
     - "product-app/pom.xml"
     - "product-app/Dockerfile"

permissions:
  id-token: write  # REQUIRED for OIDC role assumption
  contents: read   # This is required for actions/checkout

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: product-app-ecr
  ECS_CLUSTER: product-app-cluster
  ECS_SERVICE: product-app-service
  CONTAINER_NAME: product-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build Maven project
        run: mvn clean package -DskipTests
        working-directory: ./product-app  

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/ECSFargateGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and tag image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        if: github.event_name == 'push'
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        working-directory: ./product-app

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER \
                              --service $ECS_SERVICE \
                              --force-new-deployment
